version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TONGYI_API_KEY=${TONGYI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
