<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Video Notes</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0e0e0e;
      }

      body {
        margin: 0;
        background: #0e0e0e;
      }

      .startup-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 35%, rgba(60, 119, 251, 0.16), transparent 28rem),
          #0e0e0e;
        color: #e5e5e5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-mark {
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .startup-logo {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: rgba(60, 119, 251, 0.1);
        border: 1px solid rgba(60, 119, 251, 0.28);
        box-shadow: 0 18px 50px rgba(60, 119, 251, 0.18);
      }

      .startup-logo img {
        width: 38px;
        height: 38px;
        display: block;
      }

      .startup-title {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .startup-bar {
        width: 132px;
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: #262626;
      }

      .startup-bar::before {
        content: "";
        display: block;
        width: 44px;
        height: 100%;
        border-radius: inherit;
        background: #3c77fb;
        animation: startup-slide 1s ease-in-out infinite;
      }

      @keyframes startup-slide {
        0% {
          transform: translateX(-48px);
        }

        100% {
          transform: translateX(136px);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-shell" aria-label="Loading AI Video Notes">
        <div class="startup-mark">
          <div class="startup-logo">
            <img src="/icon.svg" alt="" />
          </div>
          <p class="startup-title">AI Video Notes</p>
          <div class="startup-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
